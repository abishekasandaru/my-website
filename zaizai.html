<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaiZai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 50%, #6c5b7b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Back button */
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 2px solid #fff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            z-index: 200;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        /* Main text animation */
        .text-container {
            position: relative;
            z-index: 100;
            text-align: center;
        }

        .zaizai-text {
            font-size: 100px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: nameGlow 2s ease-in-out infinite, nameScale 3s ease-in-out infinite, nameFloat 4s ease-in-out infinite;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        @keyframes nameGlow {
            0%, 100% {
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.3), 0 0 20px rgba(255, 182, 193, 0.3);
            }
            50% {
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.9), 0 0 50px rgba(255, 182, 193, 0.9);
            }
        }

        @keyframes nameScale {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }

        @keyframes nameFloat {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .subtitle {
            font-size: 28px;
            color: rgba(255, 255, 255, 0.8);
            animation: subtitlePulse 2.5s ease-in-out infinite;
            letter-spacing: 2px;
        }

        @keyframes subtitlePulse {
            0%, 100% {
                opacity: 0.6;
                transform: scale(0.95);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        /* Animated background elements */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart-big {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #ff1744;
            clip-path: polygon(50% 95%, 90% 35%, 100% 10%, 75% 0%, 50% 30%, 25% 0%, 0% 10%, 10% 35%);
            animation: heartBeat 1s ease-in-out infinite;
            opacity: 0.6;
            z-index: 2;
        }

        .heart-big:nth-child(1) {
            left: 10%;
            top: 15%;
            animation-delay: 0s;
        }

        .heart-big:nth-child(2) {
            left: 85%;
            top: 20%;
            animation-delay: 0.2s;
            background: #ff5252;
            width: 70px;
            height: 70px;
        }

        .heart-big:nth-child(3) {
            left: 15%;
            top: 75%;
            animation-delay: 0.4s;
            background: #ff6e40;
            width: 60px;
            height: 60px;
        }

        .heart-big:nth-child(4) {
            left: 80%;
            top: 70%;
            animation-delay: 0.6s;
            background: #ff1744;
            width: 75px;
            height: 75px;
        }

        .heart-big:nth-child(5) {
            left: 50%;
            top: 5%;
            animation-delay: 0.8s;
            background: #ff5252;
            width: 65px;
            height: 65px;
        }

        @keyframes heartBeat {
            0%, 100% {
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.9;
            }
        }

        /* Floating orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.4), rgba(255,182,193,0.1));
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: orbFloat 5s ease-in-out infinite;
            z-index: 2;
        }

        .orb:nth-child(6) {
            width: 100px;
            height: 100px;
            left: 20%;
            top: 40%;
            animation-delay: 0s;
        }

        .orb:nth-child(7) {
            width: 80px;
            height: 80px;
            left: 75%;
            top: 35%;
            animation-delay: 1s;
        }

        .orb:nth-child(8) {
            width: 120px;
            height: 120px;
            left: 50%;
            top: 50%;
            animation-delay: 2s;
        }

        @keyframes orbFloat {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-30px) translateX(20px);
                opacity: 0.7;
            }
        }

        /* Particles */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: particleFloat 3s ease-out infinite;
            z-index: 3;
        }

        .particle:nth-child(9) {
            width: 6px;
            height: 6px;
            left: 25%;
            top: 30%;
            animation-delay: 0s;
        }

        .particle:nth-child(10) {
            width: 5px;
            height: 5px;
            left: 70%;
            top: 50%;
            animation-delay: 0.4s;
        }

        .particle:nth-child(11) {
            width: 7px;
            height: 7px;
            left: 40%;
            top: 60%;
            animation-delay: 0.8s;
        }

        .particle:nth-child(12) {
            width: 6px;
            height: 6px;
            left: 60%;
            top: 25%;
            animation-delay: 1.2s;
        }

        .particle:nth-child(13) {
            width: 5px;
            height: 5px;
            left: 85%;
            top: 45%;
            animation-delay: 1.6s;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 1;
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            }
            100% {
                transform: translateY(-100px) translateX(50px);
                opacity: 0;
                box-shadow: 0 0 0px rgba(255, 255, 255, 0);
            }
        }

        /* Rainbow pulse */
        .pulse-rainbow {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 3px solid transparent;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulseRainbow 3s ease-out infinite;
            z-index: 1;
            background: radial-gradient(circle, rgba(255,182,193,0.2) 0%, rgba(255,182,193,0) 70%);
        }

        @keyframes pulseRainbow {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }
        }

        /* Spinning stars */
        .star-spin {
            position: absolute;
            font-size: 30px;
            animation: starSpin 4s linear infinite;
            z-index: 2;
        }

        .star-spin:nth-child(14) {
            left: 10%;
            top: 50%;
            animation-delay: 0s;
        }

        .star-spin:nth-child(15) {
            left: 90%;
            top: 50%;
            animation-delay: 1s;
        }

        @keyframes starSpin {
            0% {
                transform: rotate(0deg) translateX(100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: rotate(360deg) translateX(100px) rotate(-360deg);
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="love_animation.html" class="back-btn">← Back</a>

        <!-- Pulse background -->
        <div class="pulse-rainbow"></div>

        <!-- Background elements -->
        <div class="background">
            <!-- Beating hearts -->
            <div class="heart-big"></div>
            <div class="heart-big"></div>
            <div class="heart-big"></div>
            <div class="heart-big"></div>
            <div class="heart-big"></div>

            <!-- Floating orbs -->
            <div class="orb"></div>
            <div class="orb"></div>
            <div class="orb"></div>

            <!-- Particles -->
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>

            <!-- Spinning stars -->
            <div class="star-spin">✨</div>
            <div class="star-spin">⭐</div>
        </div>

        <!-- Main content -->
        <div class="text-container">
            <h1 class="zaizai-text">ZaiZai</h1>
            <p class="subtitle">✨ Forever Special ✨</p>
        </div>
    </div>
</body>
</html>
